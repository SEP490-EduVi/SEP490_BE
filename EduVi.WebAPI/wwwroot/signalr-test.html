<!DOCTYPE html>
<html>
<head>
    <title>SignalR Pipeline/Game Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        #log { white-space: pre-wrap; margin-top: 10px; padding: 10px; background: #2d2d2d; border-radius: 4px; max-height: 500px; overflow-y: auto; }
        input, button { padding: 6px 12px; margin: 4px; font-family: monospace; }
        .success { color: #6a9955; }
        .error { color: #f44747; }
        .message { color: #569cd6; }
    </style>
</head>
<body>
    <h3>SignalR Pipeline/Game Test Client</h3>
    <div>
        <label>Hub URL:</label>
        <input id="hubUrl" value="/hubs/pipeline" size="50" />
    </div>
    <div>
        <label>Bearer Token:</label>
        <input id="accessToken" placeholder="Paste JWT token here" size="80" />
    </div>
    <div>
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
    </div>
    <div id="log"></div>

    <script>
        let connection = null;

        function log(message, className = '') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function connect() {
            const hubUrl = document.getElementById('hubUrl').value;
            const accessToken = document.getElementById('accessToken').value.trim();

            if (!accessToken) {
                log("Access token is required to connect.", 'error');
                return;
            }

            connection = new signalR.HubConnectionBuilder()
                .withUrl(hubUrl, { accessTokenFactory: () => accessToken })
                .withAutomaticReconnect()
                .configureLogging(signalR.LogLevel.Information)
                .build();

            connection.on("PipelineProgress", (progress) => {
                log(`PipelineProgress:\n${JSON.stringify(progress, null, 2)}`, 'message');
            });

            connection.on("GameProgress", (progress) => {
                log(`GameProgress:\n${JSON.stringify(progress, null, 2)}`, 'message');
            });

            connection.on("FileReviewNotification", (notification) => {
                log(`FileReviewNotification:\n${JSON.stringify(notification, null, 2)}`, 'message');
            });

            connection.onclose(() => log("Connection closed", 'error'));
            connection.onreconnecting(() => log("Reconnecting...", 'error'));
            connection.onreconnected(() => log("Reconnected", 'success'));

            try {
                await connection.start();
                log(`Connected to ${hubUrl}`, 'success');

                await connection.invoke("JoinUserGroup");
                log(`Joined personal group from JWT claims`, 'success');

                log("Waiting for PipelineProgress/GameProgress/FileReviewNotification messages...", 'success');
            } catch (err) {
                log(`Connection failed: ${err}`, 'error');
            }
        }

        async function disconnect() {
            if (connection) {
                await connection.stop();
                log("Disconnected", 'error');
            }
        }
    </script>
</body>
</html>
