services:

  # ── Nginx (only internet-facing service) ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - main-system
    restart: unless-stopped
    networks:
      - eduvi

  # ── .NET Backend ────────────────────────────────────────────────────
  # All config is injected via env vars using ASP.NET's __ convention.
  # The .env file on the VM must define every variable below.
  main-system:
    image: ghcr.io/${GITHUB_ORG}/main-system:latest
    container_name: main-system
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"

      # Database (Google Cloud SQL for MSSQL)
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}

      # Redis (internal container — hardcoded, not from .env)
      ConnectionStrings__RedisConnection: redis:6379,abortConnect=false,connectTimeout=5000,syncTimeout=5000

      # RabbitMQ (HostName/VirtualHost are internal, rest from .env)
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      RabbitMQ__VirtualHost: /

      # JWT
      Jwt__SecretKey: ${Jwt__SecretKey}
      Jwt__Issuer: ${Jwt__Issuer}
      Jwt__Audience: ${Jwt__Audience}
      Jwt__ExpiresInMinutes: ${Jwt__ExpiresInMinutes}

      # Google OAuth
      Google__ClientId: ${Google__ClientId}

      # GCS
      GCS__BucketName: ${GCS__BucketName}
      GCS__Folders__UserInputs: ${GCS__Folders__UserInputs}
      GCS__Folders__ExpertVerifications: ${GCS__Folders__ExpertVerifications}
      GCS__Folders__EditedSlides: ${GCS__Folders__EditedSlides}
      GCS__Folders__Curricula: ${GCS__Folders__Curricula}

      # Email
      EmailSettings__SmtpHost: ${EmailSettings__SmtpHost}
      EmailSettings__SmtpPort: ${EmailSettings__SmtpPort}
      EmailSettings__SenderEmail: ${EmailSettings__SenderEmail}
      EmailSettings__SenderPassword: ${EmailSettings__SenderPassword}
      EmailSettings__SenderName: ${EmailSettings__SenderName}

      # PayOS
      PayOS__ClientId: ${PayOS__ClientId}
      PayOS__ApiKey: ${PayOS__ApiKey}
      PayOS__ChecksumKey: ${PayOS__ChecksumKey}
    restart: unless-stopped
    networks:
      - eduvi

  # ── RabbitMQ ────────────────────────────────────────────────────────
  # NO host ports — internal only. Access via: ssh -L 15672:localhost:15672 user@VM
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASSWORD: ${RABBITMQ_DEFAULT_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - eduvi

  # ── Redis ────────────────────────────────────────────────────────────
  # NO host ports — internal only.
  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - eduvi

  # ── Lesson Analysis Worker ───────────────────────────────────────────
  # NO GOOGLE_APPLICATION_CREDENTIALS — VM service account handles GCP auth via ADC
  lesson-analysis:
    image: ghcr.io/${GITHUB_ORG}/lesson-analysis:latest
    container_name: lesson-analysis
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      HELICONE_API_KEY: ${HELICONE_API_KEY:-}
    restart: unless-stopped
    networks:
      - eduvi

  # ── Slide Generator Worker ───────────────────────────────────────────
  # NO GOOGLE_APPLICATION_CREDENTIALS — VM service account handles GCP auth via ADC
  slide-generator:
    image: ghcr.io/${GITHUB_ORG}/slide-generator:latest
    container_name: slide-generator
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      HELICONE_API_KEY: ${HELICONE_API_KEY:-}
    restart: unless-stopped
    networks:
      - eduvi

  # ── Video Generator Worker ───────────────────────────────────────────
  # NO GOOGLE_APPLICATION_CREDENTIALS — VM service account handles GCP auth via ADC
  # Scale for concurrent users: docker-compose up --scale video-generator=3
  video-generator:
    image: ghcr.io/${GITHUB_ORG}/video-generator:latest
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD}
      PREFETCH_COUNT: ${VIDEO_PREFETCH_COUNT:-1}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      VIDEO_GCS_PREFIX: ${VIDEO_GCS_PREFIX:-generated_videos}
      VIDEO_RETURN_GCS_URI: ${VIDEO_RETURN_GCS_URI:-true}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
    volumes:
      - videos:/app/videos
    restart: unless-stopped
    networks:
      - eduvi

  # ── Curriculum Ingestion Worker ─────────────────────────────────────
  # NO GOOGLE_APPLICATION_CREDENTIALS — VM service account handles GCP auth via ADC
  curriculum-ingestion:
    image: ghcr.io/${GITHUB_ORG}/curriculum-ingestion:latest
    container_name: curriculum-ingestion
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      HELICONE_API_KEY: ${HELICONE_API_KEY:-}
    restart: unless-stopped
    networks:
      - eduvi

  # ── Textbook Ingestion Worker ────────────────────────────────────────
  # NO GOOGLE_APPLICATION_CREDENTIALS — VM service account handles GCP auth via ADC
  textbook-ingestion:
    image: ghcr.io/${GITHUB_ORG}/textbook-ingestion:latest
    container_name: textbook-ingestion
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      TEXTBOOK_PREFETCH_COUNT: ${TEXTBOOK_PREFETCH_COUNT:-1}
    restart: unless-stopped
    networks:
      - eduvi
 
  # ── Game Quiz Worker ────────────────────────────────────────────────
  # Generates gesture-interactive quiz JSON from edited slide content + template.
  # NO GOOGLE_APPLICATION_CREDENTIALS — VM service account handles GCP auth via ADC
  game-quiz:
    image: ghcr.io/${GITHUB_ORG}/game-quiz:latest
    container_name: game-quiz
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASSWORD}
      GAME_QUIZ_REQUEST_QUEUE: ${GAME_QUIZ_REQUEST_QUEUE:-game.quiz.requests}
      GAME_QUIZ_RESULT_QUEUE: ${GAME_QUIZ_RESULT_QUEUE:-game.quiz.results}
      GAME_QUIZ_PREFETCH_COUNT: ${GAME_QUIZ_PREFETCH_COUNT:-2}
      GAME_QUIZ_LOG_RESULT_PAYLOAD: ${GAME_QUIZ_LOG_RESULT_PAYLOAD:-true}
      GAME_QUIZ_LOG_RESULT_MAX_CHARS: ${GAME_QUIZ_LOG_RESULT_MAX_CHARS:-4000}
      # Google Cloud / Vertex AI
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      VERTEX_AI_LOCATION: ${VERTEX_AI_LOCATION:-us-central1}
      HELICONE_API_KEY: ${HELICONE_API_KEY:-}
    restart: unless-stopped
    networks:
      - eduvi

  # ── Dozzle (Log Viewer) ─────────────────────────────────────────────
  # NO host ports — access via: ssh -L 9999:localhost:8080 user@VM then open localhost:9999
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    ports:
      - "127.0.0.1:9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - eduvi

networks:
  eduvi:
    driver: bridge

volumes:
  rabbitmq_data:
  videos:
