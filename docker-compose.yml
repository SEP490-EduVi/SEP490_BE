services:

  # ── Nginx (only internet-facing service) ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - main-system
    restart: unless-stopped
    networks:
      - eduvi

  # ── .NET Backend ────────────────────────────────────────────────────
  main-system:
    image: ghcr.io/${GITHUB_ORG}/main-system:latest
    container_name: main-system
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"

      # Database (Google Cloud SQL for MSSQL)
      ConnectionStrings__DefaultConnection: ${SQL_CONNECTION_STRING}

      # Redis (internal container)
      ConnectionStrings__RedisConnection: redis:6379,abortConnect=false,connectTimeout=5000,syncTimeout=5000

      # RabbitMQ
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      RabbitMQ__VirtualHost: /

      # JWT
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: EduViAPI
      Jwt__Audience: EduViClient
      Jwt__ExpiresInMinutes: 60

      # Google OAuth
      Google__ClientId: ${GOOGLE_CLIENT_ID}

      # GCS
      GCS__BucketName: ${GCS_BUCKET_NAME}
      GCS__Folders__UserInputs: user_inputs
      GCS__Folders__ExpertVerifications: expert_verifications

      # Email
      EmailSettings__SmtpHost: smtp.gmail.com
      EmailSettings__SmtpPort: 587
      EmailSettings__SenderEmail: ${EMAIL_SENDER}
      EmailSettings__SenderPassword: ${EMAIL_PASSWORD}
      EmailSettings__SenderName: EduVi Platform

      # PayOS
      PayOS__ClientId: ${PAYOS_CLIENT_ID}
      PayOS__ApiKey: ${PAYOS_API_KEY}
      PayOS__ChecksumKey: ${PAYOS_CHECKSUM_KEY}
    restart: unless-stopped
    networks:
      - eduvi

  # ── RabbitMQ ────────────────────────────────────────────────────────
  # NO host ports — internal only. Access via: ssh -L 15672:localhost:15672 user@VM
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASSWORD: ${RABBITMQ_DEFAULT_PASSWORD}
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - eduvi

  # ── Redis ────────────────────────────────────────────────────────────
  # NO host ports — internal only.
  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - eduvi

  # ── Lesson Analysis Worker ───────────────────────────────────────────
  # NO GOOGLE_APPLICATION_CREDENTIALS — VM service account handles GCP auth via ADC
  lesson-analysis:
    image: ghcr.io/${GITHUB_ORG}/lesson-analysis:latest
    container_name: lesson-analysis
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      HELICONE_API_KEY: ${HELICONE_API_KEY:-}
    restart: unless-stopped
    networks:
      - eduvi

  # ── Slide Generator Worker ───────────────────────────────────────────
  # NO GOOGLE_APPLICATION_CREDENTIALS — VM service account handles GCP auth via ADC
  slide-generator:
    image: ghcr.io/${GITHUB_ORG}/slide-generator:latest
    container_name: slide-generator
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      HELICONE_API_KEY: ${HELICONE_API_KEY:-}
    restart: unless-stopped
    networks:
      - eduvi

  # ── Dozzle (Log Viewer) ─────────────────────────────────────────────
  # NO host ports — access via: ssh -L 9999:localhost:8080 user@VM then open localhost:9999
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - eduvi

networks:
  eduvi:
    driver: bridge
